kind = "web"
previewPath = "/"
title = "TSN 365"
version = "1.0.0"
id = "artifacts/tsn365"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18682

[services.development]
run = "pnpm --filter @workspace/tsn365 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tsn365", "run", "build" ]
publicDir = "artifacts/tsn365/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18682"
BASE_PATH = "/"
